<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FITS 파일 뷰어</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        .header p {
            font-size: 1em;
            opacity: 0.9;
        }
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 30px;
        }
        .upload-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .upload-box {
            border: 3px dashed #667eea;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
        }
        .upload-box:hover {
            background: #f0f2ff;
            border-color: #764ba2;
            transform: translateY(-2px);
        }
        .upload-box.dragover {
            background: #e8ebff;
            border-color: #764ba2;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }
        .upload-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }
        .upload-box h3 {
            color: #667eea;
            margin-bottom: 10px;
        }
        .upload-box p {
            color: #666;
            margin-bottom: 15px;
        }
        input[type="file"] {
            display: none;
        }
        .upload-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .upload-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .info-section {
            background: #f8f9ff;
            border-radius: 10px;
            padding: 20px;
            border-left: 4px solid #667eea;
        }
        .info-section h3 {
            color: #667eea;
            margin-bottom: 15px;
        }
        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
        }
        .info-item:last-child {
            border-bottom: none;
        }
        .info-label {
            font-weight: 600;
            color: #764ba2;
        }
        .info-value {
            color: #333;
            font-family: 'Courier New', monospace;
            word-break: break-all;
        }
        .image-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .image-container {
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .image-container canvas {
            max-width: 100%;
            max-height: 400px;
        }
        .image-placeholder {
            color: #999;
            text-align: center;
        }
        .histogram {
            border-radius: 10px;
            border: 1px solid #ddd;
            overflow: hidden;
        }
        .histogram canvas {
            display: block;
            width: 100%;
            height: 250px;
        }
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        .loading.active {
            display: block;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #c62828;
            display: none;
        }
        .error.active {
            display: block;
        }
        .success {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #2e7d32;
            display: none;
        }
        .success.active {
            display: block;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 10px;
        }
        .stat-box {
            background: white;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }
        .stat-label {
            font-size: 0.85em;
            color: #999;
            margin-bottom: 5px;
        }
        .stat-value {
            font-size: 1.2em;
            font-weight: 700;
            color: #667eea;
            font-family: 'Courier New', monospace;
        }
        .tabs {
            display: flex;
            gap: 10px;
            border-bottom: 2px solid #e0e0e0;
            margin-bottom: 20px;
        }
        .tab-btn {
            padding: 12px 20px;
            background: none;
            border: none;
            cursor: pointer;
            font-weight: 600;
            color: #999;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
        }
        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }
        .tab-content {
            display: none;
            max-height: 300px;
            overflow-y: auto;
        }
        .tab-content.active {
            display: block;
        }
        .header-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9em;
        }
        .header-table td {
            padding: 8px;
            border-bottom: 1px solid #e0e0e0;
        }
        .header-table td:first-child {
            font-weight: 600;
            color: #764ba2;
            width: 150px;
        }
        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            .header h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔭 FITS 파일 뷰어</h1>
            <p>천문학 이미지 분석 및 시각화 도구</p>
        </div>
        <div class="main-content">
            <!-- 왼쪽: 업로드 섹션 -->
            <div class="upload-section">
                <div class="upload-box" id="uploadBox">
                    <div class="upload-icon">📁</div>
                    <h3>FITS 파일 업로드</h3>
                    <p>파일을 여기로 드래그하거나 클릭하세요</p>
                    <button class="upload-btn">파일 선택</button>
                    <input type="file" id="fileInput" accept=".fits,.fit,.fts">
                </div>
                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p style="margin-top: 10px;">파일 처리 중...</p>
                </div>
                <div class="error" id="error"></div>
                <div class="success" id="success"></div>
                <!-- 기본 정보 -->
                <div class="info-section" id="basicInfo" style="display: none;">
                    <h3>📊 기본 정보</h3>
                    <div class="info-item">
                        <span class="info-label">파일명:</span>
                        <span class="info-value" id="fileName">-</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">이미지 크기:</span>
                        <span class="info-value" id="imageSize">-</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">픽셀 깊이:</span>
                        <span class="info-value" id="bitDepth">-</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">노출 시간:</span>
                        <span class="info-value" id="expTime">-</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">망원경:</span>
                        <span class="info-value" id="telescope">-</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">필터:</span>
                        <span class="info-value" id="filter">-</span>
                    </div>
                </div>
                <!-- 통계 정보 -->
                <div class="info-section" id="statsInfo" style="display: none;">
                    <h3>📈 픽셀 통계</h3>
                    <div class="stats-grid">
                        <div class="stat-box">
                            <div class="stat-label">최소값</div>
                            <div class="stat-value" id="minValue">-</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-label">최대값</div>
                            <div class="stat-value" id="maxValue">-</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-label">평균</div>
                            <div class="stat-value" id="meanValue">-</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-label">표준편차</div>
                            <div class="stat-value" id="stdValue">-</div>
                        </div>
                    </div>
                </div>
            </div>
            <!-- 오른쪽: 이미지 표시 섹션 -->
            <div class="image-section">
                <div class="image-container" id="imageContainer">
                    <div class="image-placeholder">이미지가 표시됩니다</div>
                </div>
                <div class="histogram" id="histogram" style="display: none;">
                    <canvas id="histogramCanvas"></canvas>
                </div>
                <div class="info-section" id="headerInfo" style="display: none;">
                    <div class="tabs">
                        <button class="tab-btn active" onclick="switchTab(event, 'basic')">기본</button>
                        <button class="tab-btn" onclick="switchTab(event, 'advanced')">상세</button>
                    </div>
                    <div id="basic" class="tab-content active">
                        <table class="header-table" id="basicHeader"></table>
                    </div>
                    <div id="advanced" class="tab-content">
                        <table class="header-table" id="advancedHeader"></table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- FITS.js 라이브러리 로드 -->
    <script src="https://cdn.jsdelivr.net/npm/fitsjs@0.4.7/dist/fits.min.js"></script>
    
    <script>
        // FITS 라이브러리 로드 대기
        let fitsReady = false;
        
        function checkFITSReady() {
            if (typeof FITS !== 'undefined' && FITS.File) {
                fitsReady = true;
                console.log('✅ FITS 라이브러리 로드됨');
                return true;
            }
            return false;
        }

        // 라이브러리 로드 대기 (최대 5초)
        let attempts = 0;
        const checkInterval = setInterval(() => {
            attempts++;
            if (checkFITSReady() || attempts > 50) {
                clearInterval(checkInterval);
                if (!fitsReady) {
                    console.error('❌ FITS 라이브러리 로드 실패');
                }
            }
        }, 100);

        // 요소 선택
        const uploadBox = document.getElementById('uploadBox');
        const fileInput = document.getElementById('fileInput');
        const loading = document.getElementById('loading');
        const error = document.getElementById('error');
        const success = document.getElementById('success');
        const imageContainer = document.getElementById('imageContainer');
        const basicInfo = document.getElementById('basicInfo');
        const statsInfo = document.getElementById('statsInfo');
        const headerInfo = document.getElementById('headerInfo');
        const histogram = document.getElementById('histogram');

        // 업로드 박스 클릭 이벤트
        uploadBox.addEventListener('click', () => {
            fileInput.click();
        });

        // 파일 선택 처리
        fileInput.addEventListener('change', (e) => {
            if (
